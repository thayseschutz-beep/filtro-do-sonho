<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Green Mind — App</title>
<link rel="stylesheet" href="assets/brand.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--gm-ui);
    background:
      radial-gradient(1200px 600px at 50% -10%, #eef4ef 0%, transparent 60%),
      #e7ece9;
    color: var(--gm-ink);
    display: grid; place-items: center; min-height: 100dvh; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  #root { display: grid; place-items: center; }

  /* Embed mode (inside the landing hero device): fill the iframe, drop the bezel */
  body.embed { padding: 0; background: var(--gm-cloud); display: block; min-height: 0; }
  body.embed #root { display: block; }
  body.embed .phone { width: 100vw; height: 100vh; border-radius: 0; padding: 0; box-shadow: none; background: var(--gm-cloud); }
  body.embed .screen { inset: 0; border-radius: 0; }
  body.embed .island, body.embed .home-ind { display: none; }

  /* ============ DARK THEME ============ */
  /* Overriding the neutral tokens on .screen cascades to all descendants
     (and to .screen's own background, which reads var(--gm-cloud)). */
  .screen[data-theme="dark"] {
    --gm-cloud: #0C1511;   /* app background */
    --gm-paper: #15211B;   /* cards / sheets */
    --gm-line:  rgba(255,255,255,.09);
    --gm-ink:   #E8F1EC;   /* primary text */
    --gm-slate: #9DB1A6;
    --gm-slate-2: #6E847A;
    --gm-mint:  #182C20;   /* soft green surfaces */
    --gm-mint-2:#13231A;
    --gm-coral-bg: #2A1718;
    --gm-amber-bg: #2A2310;
  }
  /* Spots that hardcode a light fill + white text — re-tint for dark */
  .screen[data-theme="dark"] .chip.on,
  .screen[data-theme="dark"] .icon-btn.solid { background: var(--gm-green); color: #06140D; border-color: var(--gm-green); }
  .screen[data-theme="dark"] .method-col.achieve { background: rgba(34,197,94,.15); }
  .screen[data-theme="dark"] .method-col.stop { background: rgba(239,68,68,.15); }
  .screen[data-theme="dark"] .method-col.how { background: rgba(59,130,246,.15); }
  .screen[data-theme="dark"] .method-col p { opacity: .92; }
  .screen[data-theme="dark"] .key:active { background: var(--gm-mint); }
  .screen[data-theme="dark"] .tabbar { background: linear-gradient(to top, var(--gm-paper) 64%, rgba(21,33,27,0)); }

  /* ============ DEVICE FRAME ============ */
  .phone {
    position: relative; width: 390px; height: 844px; flex: none;
    border-radius: 52px; background: #0F2419;
    padding: 7px;
    box-shadow: 0 50px 90px -30px rgba(15,36,25,.55), 0 0 0 2px rgba(15,36,25,.85), inset 0 0 0 7px #0F2419;
  }
  .screen {
    position: absolute; inset: 7px; border-radius: 45px; overflow: hidden;
    background: var(--gm-cloud); display: flex; flex-direction: column;
    color: var(--gm-ink);
  }
  /* Status bar */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 50px; z-index: 60;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 30px 0; pointer-events: none;
    font-family: var(--gm-num); font-weight: 600; font-size: 15px;
    color: var(--gm-ink); transition: color .3s;
  }
  .statusbar.dark { color: #fff; }
  .statusbar .sb-icons { display: flex; align-items: center; gap: 6px; }
  .statusbar .sb-icons svg { display: block; }
  .island {
    position: absolute; top: 13px; left: 50%; transform: translateX(-50%);
    width: 116px; height: 34px; border-radius: 20px; background: #07140E; z-index: 65;
  }
  .home-ind {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 132px; height: 5px; border-radius: 9px; background: rgba(15,36,25,.28); z-index: 70; pointer-events: none;
  }
  .statusbar.dark ~ .home-ind, .home-ind.light { background: rgba(255,255,255,.55); }

  /* ============ SCROLL AREAS ============ */
  .scr { position: relative; height: 100%; display: flex; flex-direction: column; }
  .scroll { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; height: 100%; }
  .scroll::-webkit-scrollbar { width: 0; }
  .scr.scroll { padding: 56px 18px 0; display: block; }
  .scroll-pad { height: 104px; flex: none; }

  /* ============ SHARED PRIMITIVES ============ */
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--gm-green-600); }
  .muted { color: var(--gm-slate); font-size: 13px; }
  .pos { color: var(--gm-green-600); }
  .neg { color: var(--gm-coral); }
  h2, h3 { margin: 0; }
  .h-title { font-family: var(--gm-display); font-size: 26px; font-weight: 700; letter-spacing: -.02em; margin: 2px 0 0; }

  .link-btn { background: none; border: 0; color: var(--gm-green-600); font-family: var(--gm-ui); font-weight: 600; font-size: 14px; cursor: pointer; padding: 4px; }
  .link-btn.right { align-self: flex-end; }
  .link-btn.strong { color: var(--gm-green); font-weight: 700; }
  .link-btn:disabled { color: var(--gm-slate-2); }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--gm-grad); color: #fff; border: 0; cursor: pointer;
    font-family: var(--gm-ui); font-weight: 600; font-size: 15px;
    padding: 13px 20px; border-radius: 16px;
    box-shadow: 0 12px 24px -10px rgba(34,197,94,.7);
    transition: transform .15s, box-shadow .2s, filter .2s;
  }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary:disabled { background: #d6ddd8; color: #fff; box-shadow: none; cursor: default; }
  .btn-primary.big { padding: 16px 22px; border-radius: 18px; font-size: 16px; }
  .btn-primary.full { width: 100%; }

  .btn-ghost {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--gm-paper); color: var(--gm-ink); border: 1.5px solid var(--gm-line);
    font-family: var(--gm-ui); font-weight: 600; font-size: 15px; cursor: pointer;
    padding: 14px 20px; border-radius: 16px;
  }
  .btn-ghost.full { width: 100%; }

  .card {
    background: var(--gm-paper); border: 1px solid var(--gm-line);
    border-radius: var(--gm-r); padding: 16px; margin-top: 14px;
    box-shadow: var(--gm-shadow-sm);
  }
  .card.flush { padding: 0; overflow: hidden; }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .card-head.pad { padding: 16px 16px 0; margin-bottom: 8px; }
  .card-head h3 { font-family: var(--gm-display); font-size: 16px; font-weight: 600; margin-top: 2px; }
  .legend { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gm-slate); }
  .legend i { width: 8px; height: 8px; border-radius: 3px; display: inline-block; margin-left: 6px; }

  .icon-btn { width: 40px; height: 40px; border-radius: 13px; border: 1px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-ink); display: grid; place-items: center; cursor: pointer; position: relative; flex: none; }
  .icon-btn.solid { background: var(--gm-ink); color: #fff; border: 0; }
  .icon-btn.ghost { border: 0; background: transparent; }
  .dot-badge { position: absolute; top: 9px; right: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--gm-coral); border: 1.5px solid #fff; }

  /* ============ DASHBOARD ============ */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 12px; }
  .hi { display: flex; align-items: center; gap: 11px; }
  .avatar { width: 44px; height: 44px; border-radius: 15px; background: var(--gm-grad); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 15px; letter-spacing: .02em; }
  .hi-sub { font-size: 12.5px; color: var(--gm-slate); display: block; }
  .hi-name { font-family: var(--gm-display); font-size: 18px; font-weight: 600; line-height: 1.1; }
  .topbar-actions { display: flex; gap: 8px; }

  .balance-hero {
    position: relative; overflow: hidden; margin-top: 4px;
    background: var(--gm-grad-dark); color: #fff;
    border-radius: var(--gm-r-lg); padding: 20px;
    box-shadow: 0 24px 44px -20px rgba(15,36,25,.7);
  }
  .bh-grain { position: absolute; inset: 0; opacity: .5;
    background:
      radial-gradient(140px 140px at 88% -8%, rgba(74,222,128,.45), transparent 70%),
      radial-gradient(180px 160px at 10% 120%, rgba(34,197,94,.30), transparent 70%); }
  .bh-top { position: relative; display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; color: rgba(255,255,255,.75); }
  .bh-top-r { display: flex; align-items: center; gap: 8px; }
  .bh-rate-pill { background: rgba(74,222,128,.22); color: #bbf7d0; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 9px; }
  .bh-eye { background: rgba(255,255,255,.14); border: 0; color: #fff; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; cursor: pointer; }
  .bh-amount { position: relative; font-size: 38px; font-weight: 700; margin: 6px 0 16px; letter-spacing: -.02em; }
  .bh-split { position: relative; display: flex; gap: 10px; }
  .bh-chip { flex: 1; display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.10); backdrop-filter: blur(6px); border-radius: 15px; padding: 10px 12px; }
  .bh-chip small { display: block; font-size: 11px; color: rgba(255,255,255,.72); }
  .bh-chip b { font-size: 14.5px; font-weight: 600; }
  .bh-ic { width: 28px; height: 28px; border-radius: 9px; display: grid; place-items: center; flex: none; }
  .bh-ic.up { background: rgba(74,222,128,.30); color: #86efac; }
  .bh-ic.down { background: rgba(248,113,113,.26); color: #fca5a5; }

  .quick { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
  .quick-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 16px; padding: 12px 4px; cursor: pointer; font-family: var(--gm-ui); font-size: 11.5px; font-weight: 500; color: var(--gm-ink); }
  .qb-ic { width: 38px; height: 38px; border-radius: 12px; background: var(--gm-mint); color: var(--gm-green-600); display: grid; place-items: center; }
  .quick-btn.hot .qb-ic { background: var(--gm-grad); color: #fff; }

  .x-axis { display: flex; justify-content: space-between; padding: 6px 4px 0; font-size: 11px; color: var(--gm-slate-2); font-family: var(--gm-num); }

  .dist { display: flex; align-items: center; gap: 16px; }
  .dist-donut { position: relative; flex: none; display: grid; place-items: center; }
  .dist-c { position: absolute; inset: 0; display: grid; place-content: center; justify-items: center; text-align: center; }
  .dist-c b { font-size: 15px; font-family: var(--gm-num); }
  .dist-c span { font-size: 10px; color: var(--gm-slate); }
  .dist-list { list-style: none; margin: 0; padding: 0; flex: 1; display: flex; flex-direction: column; gap: 9px; }
  .dist-list li { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .dist-list li i { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .dist-list li span { flex: 1; color: var(--gm-ink); }
  .dist-list li b { font-family: var(--gm-num); font-size: 13px; }

  /* Transaction rows */
  .tx-list { list-style: none; margin: 0; padding: 0; }
  .tx-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-top: 1px solid var(--gm-line); }
  .tx-list .tx-row:first-child { border-top: 0; }
  .tx-meta { flex: 1; min-width: 0; }
  .tx-meta b { display: block; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta span { font-size: 12px; color: var(--gm-slate); }
  .tx-amt { font-size: 14.5px; font-weight: 600; white-space: nowrap; }

  /* ============ PAGE HEADERS ============ */
  .page-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 8px; gap: 12px; }
  .page-head .ph-center { text-align: center; flex: 1; }
  .month-pick { display: inline-flex; align-items: center; gap: 5px; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 12px; padding: 9px 13px; font-family: var(--gm-ui); font-weight: 600; font-size: 13px; color: var(--gm-ink); cursor: pointer; }

  .summary-2 { display: flex; gap: 10px; margin-top: 6px; }
  .summary-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 6px; }
  .summary-3 .sum { padding: 12px; }
  .summary-3 .sum b { font-size: 15px; }
  .sum.bal { border-left: 3px solid var(--gm-ink); }
  .sum.bal b { color: var(--gm-ink); }
  .sum { flex: 1; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 16px; padding: 13px 15px; }
  .sum span { font-size: 12px; color: var(--gm-slate); }
  .sum b { display: block; font-size: 18px; font-weight: 700; margin-top: 2px; }
  .sum.up { border-left: 3px solid var(--gm-green); }
  .sum.up b { color: var(--gm-green-600); }
  .sum.down { border-left: 3px solid var(--gm-coral); }
  .sum.down b { color: var(--gm-coral); }

  .chips { display: flex; gap: 8px; margin: 16px 0 4px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-slate); border-radius: 11px; padding: 8px 14px; font-family: var(--gm-ui); font-size: 13px; font-weight: 500; cursor: pointer; }
  .chip.on { background: var(--gm-ink); color: #fff; border-color: var(--gm-ink); }

  .day-group { margin-top: 16px; }
  .day-head { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 7px; }
  .day-head span { font-size: 12.5px; color: var(--gm-slate); text-transform: capitalize; font-weight: 500; }
  .day-head b { font-size: 13px; font-family: var(--gm-num); }

  /* ============ CARTÕES ============ */
  .card-carousel { display: flex; gap: 12px; overflow-x: auto; padding: 8px 0 6px; margin: 0 -18px; padding-left: 18px; padding-right: 18px; scroll-snap-type: x mandatory; }
  .card-carousel::-webkit-scrollbar { height: 0; }
  .credit-card { scroll-snap-align: start; flex: none; width: 270px; height: 162px; border-radius: 22px; color: #fff; text-align: left; padding: 16px 18px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; border: 0; box-shadow: 0 18px 30px -16px rgba(15,36,25,.6); opacity: .62; transform: scale(.96); transition: .25s; }
  .credit-card.on { opacity: 1; transform: scale(1); }
  .cc-top { display: flex; align-items: center; justify-content: space-between; }
  .cc-num { font-size: 16px; letter-spacing: .14em; }
  .cc-foot { display: flex; align-items: flex-end; justify-content: space-between; }
  .cc-foot small { font-size: 10.5px; opacity: .8; display: block; }
  .cc-foot b { font-size: 17px; font-weight: 700; }
  .cc-brand { font-size: 13px; font-weight: 600; font-style: italic; opacity: .95; }

  .limit-row { display: flex; align-items: baseline; gap: 8px; }
  .gm-num.big, .big { font-size: 24px; font-weight: 700; }
  .limit-bar { height: 9px; border-radius: 6px; background: var(--gm-cloud); overflow: hidden; margin: 12px 0; }
  .limit-bar span { display: block; height: 100%; border-radius: 6px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .limit-meta { display: flex; justify-content: space-between; }
  .limit-meta small { font-size: 11px; color: var(--gm-slate); display: block; }
  .limit-meta b { font-size: 14px; font-family: var(--gm-num); }

  /* ============ METAS ============ */
  .goals-hero { display: flex; align-items: center; gap: 18px; margin-top: 8px; background: var(--gm-grad-dark); color: #fff; border-radius: var(--gm-r-lg); padding: 18px 20px; box-shadow: 0 24px 44px -22px rgba(15,36,25,.7); }
  .gh-ring b { font-size: 17px; font-family: var(--gm-num); }
  .goals-hero > div span { font-size: 12.5px; color: rgba(255,255,255,.75); }
  .goals-hero > div strong { display: block; font-size: 24px; font-weight: 700; margin: 2px 0; font-family: var(--gm-num); }
  .goals-hero > div small { font-size: 12px; color: rgba(255,255,255,.7); }

  .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .goal-card { background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 18px; padding: 14px; box-shadow: var(--gm-shadow-sm); }
  .gc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .gc-ic { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; }
  .gc-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--gm-mint); color: var(--gm-green-600); font-size: 10.5px; font-weight: 600; padding: 4px 8px; border-radius: 8px; }
  .gc-title { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; min-height: 34px; }
  .gc-bar { height: 7px; border-radius: 5px; background: var(--gm-cloud); overflow: hidden; }
  .gc-bar span { display: block; height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .gc-meta { display: flex; align-items: baseline; gap: 5px; margin-top: 9px; }
  .gc-meta b { font-size: 15px; font-family: var(--gm-num); font-weight: 700; }
  .gc-month { display: block; margin-top: 4px; color: var(--gm-green-600); font-size: 11.5px; font-weight: 500; }

  /* ============ RELATÓRIOS ============ */
  .rep-total { font-size: 32px; font-weight: 700; margin: 4px 0 2px; }
  .rep-vs { font-size: 13px; color: var(--gm-slate); margin-bottom: 8px; }
  .rep-list { list-style: none; margin: 0; padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 14px; }
  .rep-list li { display: flex; align-items: center; gap: 12px; }
  .rep-bar-wrap { flex: 1; }
  .rep-bar-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .rep-bar-top b { font-family: var(--gm-num); }
  .rep-bar { height: 8px; border-radius: 5px; background: var(--gm-cloud); overflow: hidden; }
  .rep-bar span { display: block; height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(.22,1,.36,1); }

  /* ============ TAB BAR + FAB ============ */
  .tabbar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 50; height: 86px; padding: 0 18px 18px;
    display: grid; grid-template-columns: repeat(5, 1fr); align-items: center;
    background: linear-gradient(to top, var(--gm-paper) 62%, rgba(255,255,255,0)); }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: 0; cursor: pointer; color: var(--gm-slate-2); font-family: var(--gm-ui); font-size: 10px; font-weight: 600; padding-top: 12px; }
  .tab.active { color: var(--gm-green-600); }
  .fab { width: 56px; height: 56px; border-radius: 19px; background: var(--gm-grad); color: #fff; border: 0; display: grid; place-items: center; cursor: pointer; justify-self: center; margin-top: -6px; box-shadow: 0 16px 26px -10px rgba(34,197,94,.8); transition: transform .15s; }
  .fab:active { transform: scale(.92) rotate(90deg); }

  /* Entrance animations are TRANSFORM-ONLY (no opacity) so content is always visible
     even if a throttled iframe freezes the animation at its first frame. */
  .view-anim { animation: viewIn .4s cubic-bezier(.22,1,.36,1); }
  @keyframes viewIn { from { transform: translateY(10px); } to { transform: none; } }
  @media (prefers-reduced-motion: reduce) { .view-anim, .intro-stage, .splash-mark { animation: none !important; } }
  @keyframes draw { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }

  /* ============ ONBOARDING ============ */
  .ob { height: 100%; position: relative; display: flex; flex-direction: column; }
  .splash { background: var(--gm-grad-dark); align-items: center; justify-content: center; }
  .splash-glow { position: absolute; inset: 0; background: radial-gradient(360px 360px at 50% 38%, rgba(34,197,94,.40), transparent 70%); }
  .splash-mark { position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; animation: splashIn .8s ease; }
  @keyframes splashIn { from { transform: scale(.92); } to { transform: none; } }
  .splash-mark img { width: 96px; height: 96px; filter: drop-shadow(0 10px 26px rgba(0,0,0,.35)); }
  .splash-tag { color: rgba(255,255,255,.7); font-size: 13.5px; letter-spacing: .01em; }
  .splash-loader { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 120px; height: 4px; border-radius: 4px; background: rgba(255,255,255,.18); overflow: hidden; }
  .splash-loader span { display: block; height: 100%; width: 40%; border-radius: 4px; background: #fff; animation: load 1.6s ease-in-out infinite; }
  @keyframes load { 0% { transform: translateX(-130%); } 100% { transform: translateX(330%); } }

  .intro { padding: 60px 26px 30px; }
  .intro-top { display: flex; align-items: center; justify-content: space-between; }
  .intro-art { position: relative; height: 260px; }
  .intro-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; animation: viewIn .45s ease; }
  .ia-card { position: absolute; background: var(--gm-paper); border-radius: 20px; box-shadow: var(--gm-shadow); border: 1px solid var(--gm-line); }
  .ia-hero { left: 50%; top: 24px; transform: translateX(-50%); width: 232px; padding: 18px 20px; background: var(--gm-grad-dark); color: #fff; border: 0; }
  .ia-label { font-size: 12px; color: rgba(255,255,255,.75); }
  .ia-hero strong { display: block; font-size: 30px; font-weight: 700; margin: 4px 0 12px; }
  .ia-pills { display: flex; gap: 8px; }
  .ia-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; font-family: var(--gm-num); padding: 5px 9px; border-radius: 9px; }
  .ia-pill.up { background: rgba(74,222,128,.22); color: #86efac; }
  .ia-pill.down { background: rgba(248,113,113,.2); color: #fca5a5; }
  .ia-mini { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
  .ia-mini b { display: block; font-size: 13px; }
  .ia-mini span { font-size: 11.5px; color: var(--gm-slate); }
  .ia-mini .ia-dot { width: 11px; height: 11px; border-radius: 4px; flex: none; }
  .ia-f1 { left: -6px; bottom: 26px; animation: float1 4s ease-in-out infinite; }
  .ia-f2 { right: -6px; bottom: 0; animation: float2 4.6s ease-in-out infinite; }
  @keyframes float1 { 50% { transform: translateY(-9px); } }
  @keyframes float2 { 50% { transform: translateY(-12px); } }
  .ia-donut { left: 50%; top: 16px; transform: translateX(-50%); width: 200px; height: 200px; display: grid; place-items: center; border-radius: 26px; }
  .ia-donut-c { position: absolute; text-align: center; }
  .ia-donut-c b { font-size: 26px; font-family: var(--gm-num); display: block; }
  .ia-donut-c span { font-size: 12px; color: var(--gm-slate); }
  .ia-goal { left: 50%; top: 30px; transform: translateX(-50%); width: 220px; display: flex; align-items: center; gap: 16px; padding: 18px; }
  .ia-ring-c b { font-size: 22px; font-family: var(--gm-num); }
  .ia-goal-meta b { display: block; font-size: 15px; }
  .ia-goal-meta span { font-size: 12px; color: var(--gm-slate); }

  .intro-copy h2 { font-family: var(--gm-display); font-size: 28px; font-weight: 700; line-height: 1.12; letter-spacing: -.02em; margin: 8px 0 10px; white-space: pre-line; }
  .intro-copy p { margin: 0; color: var(--gm-slate); font-size: 15px; line-height: 1.5; max-width: 300px; }
  .intro-foot { display: flex; flex-direction: column; gap: 18px; }
  .dots { display: flex; gap: 7px; justify-content: center; }
  .dot { width: 7px; height: 7px; border-radius: 9px; background: var(--gm-line); cursor: pointer; transition: .3s; }
  .dot.on { width: 22px; background: var(--gm-green); }

  .auth { padding: 70px 26px 28px; justify-content: flex-start; }
  .auth-head { text-align: center; margin-bottom: 22px; }
  .auth-mark { width: 60px; height: 60px; margin: 0 auto 14px; border-radius: 18px; background: var(--gm-mint); display: grid; place-items: center; }
  .auth-mark img { width: 42px; height: 42px; }
  .auth-head h2 { font-family: var(--gm-display); font-size: 24px; font-weight: 700; }
  .auth-head p { margin: 6px 0 0; color: var(--gm-slate); font-size: 14px; }
  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field > span, .field-label { font-size: 12.5px; font-weight: 600; color: var(--gm-ink); }
  .field-label { margin: 6px 2px 2px; }
  .field input { font-family: var(--gm-ui); font-size: 15px; padding: 14px 15px; border-radius: 14px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-ink); outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--gm-green); }
  .field-pw { position: relative; display: flex; }
  .field-pw input { flex: 1; padding-right: 48px; }
  .field-pw button { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: 0; color: var(--gm-slate); width: 38px; height: 38px; display: grid; place-items: center; cursor: pointer; }
  .auth-or { display: flex; align-items: center; gap: 12px; color: var(--gm-slate-2); font-size: 12px; margin: 4px 0; }
  .auth-or::before, .auth-or::after { content: ''; flex: 1; height: 1px; background: var(--gm-line); }
  .auth-switch { text-align: center; margin-top: auto; padding-top: 18px; font-size: 14px; color: var(--gm-slate); }

  /* ============ ADD SHEET ============ */
  .sheet-wrap { position: absolute; inset: 0; z-index: 80; pointer-events: none; }
  .sheet-wrap.open { pointer-events: auto; }
  .sheet-backdrop { position: absolute; inset: 0; background: rgba(7,20,14,.5); opacity: 0; transition: opacity .3s; }
  .sheet-wrap.open .sheet-backdrop { opacity: 1; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--gm-paper); border-radius: 30px 30px 45px 45px; padding: 10px 20px 26px; transform: translateY(100%); transition: transform .38s cubic-bezier(.22,1,.36,1); max-height: 92%; display: flex; flex-direction: column; }
  .sheet-wrap.open .sheet { transform: none; }
  .sheet-grip { width: 40px; height: 5px; border-radius: 4px; background: var(--gm-line); margin: 2px auto 10px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sheet-head strong { font-family: var(--gm-display); font-size: 16px; font-weight: 600; }

  .seg { display: flex; background: var(--gm-cloud); border-radius: 14px; padding: 4px; gap: 4px; }
  .seg button { flex: 1; border: 0; background: none; padding: 10px; border-radius: 11px; font-family: var(--gm-ui); font-weight: 600; font-size: 14px; color: var(--gm-slate); cursor: pointer; transition: .2s; }
  .seg button.on { background: var(--gm-paper); box-shadow: var(--gm-shadow-sm); }
  .seg button.on.neg { color: var(--gm-coral); }
  .seg button.on.pos { color: var(--gm-green-600); }

  .amount-display { display: flex; align-items: baseline; justify-content: center; gap: 5px; padding: 30px 0 24px; }
  .ad-sign { font-size: 28px; font-weight: 700; }
  .ad-cur { font-size: 20px; color: var(--gm-slate); font-family: var(--gm-num); align-self: center; }
  .ad-val { font-size: 46px; font-weight: 700; letter-spacing: -.02em; }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .key { height: 56px; border-radius: 16px; border: 0; background: var(--gm-cloud); font-family: var(--gm-num); font-size: 22px; font-weight: 600; color: var(--gm-ink); cursor: pointer; display: grid; place-items: center; transition: .12s; }
  .key:active { background: var(--gm-mint); transform: scale(.96); }
  .key.del { background: transparent; }

  .details { display: flex; flex-direction: column; gap: 10px; padding-top: 6px; overflow-y: auto; }
  .det-amount { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px 6px; }
  .det-amount b { font-size: 22px; font-weight: 700; cursor: pointer; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-pick { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 11px 4px; border-radius: 14px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); cursor: pointer; transition: .15s; }
  .cat-pick small { font-size: 10px; font-weight: 500; color: var(--gm-ink); text-align: center; line-height: 1.15; }
  .cp-ic { width: 36px; height: 36px; border-radius: 11px; display: grid; place-items: center; }
  .acct-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .bucket-hint { display: flex; align-items: center; gap: 6px; font-size: 12.5px; border-radius: 12px; padding: 10px 12px; margin-top: 2px; }
  .bucket-hint b { font-weight: 700; }

  /* ===== 50/30/20 Allocation ===== */
  .alloc { display: flex; flex-direction: column; gap: 14px; }
  .alloc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .alloc-label { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; }
  .alloc-label i { width: 9px; height: 9px; border-radius: 3px; }
  .alloc-label small { color: var(--gm-slate-2); font-size: 11px; font-weight: 500; margin-left: 2px; }
  .alloc-val { font-size: 13px; font-weight: 600; }
  .alloc-val.over { color: var(--gm-coral); }
  .alloc-bar { position: relative; height: 9px; border-radius: 6px; background: var(--gm-cloud); overflow: visible; }
  .alloc-bar span { display: block; height: 100%; border-radius: 6px; transition: width 1s cubic-bezier(.22,1,.36,1); max-width: 100%; }
  .alloc-target { position: absolute; top: -3px; width: 2px; height: 15px; border-radius: 2px; background: rgba(15,36,25,.28); transform: translateX(-1px); }

  /* ===== Transaction tags / delete ===== */
  .tx-tag { display: inline-block; font-style: normal; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 6px; margin: 0 5px; vertical-align: middle; }
  .tx-tag.parc { background: var(--gm-mint); color: var(--gm-green-600); }
  .tx-del { background: none; border: 0; color: var(--gm-slate-2); cursor: pointer; padding: 4px; display: grid; place-items: center; flex: none; }
  .tx-del:hover { color: var(--gm-coral); }

  .bh-rate { display: flex; flex-direction: column; justify-content: center; align-items: flex-end; padding-left: 4px; }
  .bh-rate small { font-size: 10.5px; color: rgba(255,255,255,.72); text-align: right; }
  .bh-rate b { font-size: 18px; font-weight: 700; color: #86efac; }

  .seg-page { margin: 16px 0 0; }
  .seg-page button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }

  /* ===== Filtro do Sonho ===== */
  .goal-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .dream-card { background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 20px; padding: 16px; box-shadow: var(--gm-shadow-sm); transition: border-color .2s; }
  .dream-card.open { border-color: var(--gm-mint); box-shadow: var(--gm-shadow); }
  .dc-head { display: flex; align-items: center; gap: 12px; background: none; border: 0; width: 100%; cursor: pointer; padding: 0; text-align: left; }
  .dc-ic { width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center; flex: none; }
  .dc-title { flex: 1; min-width: 0; }
  .dc-title b { display: block; font-size: 15px; font-weight: 600; }
  .dc-title span { font-size: 12px; color: var(--gm-slate); }
  .dc-progress { margin-top: 13px; }
  .dc-amts { display: flex; align-items: baseline; gap: 6px; margin-bottom: 7px; }
  .dc-amts b { font-size: 17px; font-weight: 700; }
  .dc-bar { height: 8px; border-radius: 5px; background: var(--gm-cloud); overflow: hidden; }
  .dc-bar span { display: block; height: 100%; border-radius: 5px; transition: width 1s cubic-bezier(.22,1,.36,1); }
  .dc-sub { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; font-size: 12px; }
  .dc-sub > span:first-child { font-weight: 600; color: var(--gm-ink); }
  .dc-days { display: inline-flex; align-items: center; gap: 4px; color: var(--gm-slate); }
  .dc-days.soon { color: var(--gm-amber); }
  .dc-days.late { color: var(--gm-coral); }
  .method { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; animation: viewIn .3s ease; }
  .method-col { border-radius: 13px; padding: 10px; }
  .method-col span { display: flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; margin-bottom: 5px; }
  .method-col p { margin: 0; font-size: 11px; line-height: 1.35; color: var(--gm-ink); opacity: .85; }
  .method-col.achieve { background: var(--gm-mint-2); } .method-col.achieve span { color: var(--gm-green-600); }
  .method-col.stop { background: var(--gm-coral-bg); } .method-col.stop span { color: var(--gm-coral); }
  .method-col.how { background: #EFF6FF; } .method-col.how span { color: var(--gm-blue); }

  .done-section { margin-top: 18px; }
  .done-head { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--gm-slate); font-weight: 500; margin-bottom: 10px; }
  .done-row { display: flex; align-items: center; gap: 10px; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; opacity: .8; }
  .done-row b { flex: 1; font-size: 13.5px; font-weight: 500; color: var(--gm-slate); text-decoration: line-through; }
  .done-row span { font-size: 12.5px; color: var(--gm-slate-2); }

  /* ============ DATA / SITUAÇÃO / LOTE (add sheet) ============ */
  .date-field { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 14px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-slate); }
  .date-field input[type="date"], .date-field input { border: 0; background: none; outline: none; font-family: var(--gm-ui); font-size: 15px; color: var(--gm-ink); flex: 1; min-width: 0; }
  .date-field input::-webkit-calendar-picker-indicator { opacity: .55; cursor: pointer; }
  .date-month { font-size: 12px; font-weight: 600; color: var(--gm-green-600); background: var(--gm-mint); padding: 4px 9px; border-radius: 8px; white-space: nowrap; }
  .seg.situ button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 13.5px; }
  .seg.situ button:disabled { opacity: .4; cursor: default; }
  .situ-note { margin: 8px 2px 2px; font-size: 12px; color: var(--gm-slate); line-height: 1.4; }

  .repeat-row { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer; margin-top: 6px; padding: 12px 14px; border-radius: 16px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); }
  .repeat-row.on { border-color: var(--gm-green); background: var(--gm-mint-2); }
  .rr-ic { width: 36px; height: 36px; border-radius: 11px; background: var(--gm-mint); color: var(--gm-green-600); display: grid; place-items: center; flex: none; }
  .rr-txt { flex: 1; min-width: 0; }
  .rr-txt b { display: block; font-size: 14px; font-weight: 600; }
  .rr-txt span { font-size: 11.5px; color: var(--gm-slate); }
  .rr-switch { width: 42px; height: 25px; border-radius: 14px; background: var(--gm-line); position: relative; flex: none; transition: background .2s; }
  .rr-switch i { position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .2s; }
  .rr-switch.on { background: var(--gm-green); }
  .rr-switch.on i { transform: translateX(17px); }
  .lote-box { margin-top: 10px; padding: 14px; border-radius: 16px; background: var(--gm-cloud); border: 1px solid var(--gm-line); }
  .lote-step { display: flex; align-items: center; justify-content: space-between; }
  .lote-step > span { font-size: 13.5px; font-weight: 500; }
  .stepper { display: flex; align-items: center; gap: 6px; }
  .stepper button { width: 34px; height: 34px; border-radius: 10px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-ink); display: grid; place-items: center; cursor: pointer; }
  .stepper button:disabled { opacity: .4; cursor: default; }
  .stepper b { min-width: 34px; text-align: center; font-size: 18px; font-weight: 700; }
  .lote-hint { display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 12px; color: var(--gm-green-600); }
  .lote-hint b { font-weight: 700; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ============ MONTH NAV ============ */
  .month-nav { display: inline-flex; align-items: center; gap: 4px; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 12px; padding: 4px; }
  .month-nav b { font-size: 13px; font-weight: 600; min-width: 96px; text-align: center; }
  .month-nav button { width: 30px; height: 30px; border-radius: 9px; border: 0; background: var(--gm-cloud); color: var(--gm-ink); display: grid; place-items: center; cursor: pointer; }
  .month-nav.on-dark { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.14); }
  .month-nav.on-dark b { color: #fff; }
  .month-nav.on-dark button { background: rgba(255,255,255,.14); color: #fff; }

  /* ============ PROV BANNER (dashboard) ============ */
  .prov-banner { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer; margin-top: 16px; padding: 14px 16px; border-radius: var(--gm-r); border: 1px solid var(--gm-amber); background: var(--gm-amber-bg); color: var(--gm-ink); }
  .pb-ic { width: 40px; height: 40px; border-radius: 12px; background: var(--gm-amber); color: #fff; display: grid; place-items: center; flex: none; }
  .pb-txt { flex: 1; min-width: 0; }
  .pb-txt b { display: block; font-size: 14px; font-weight: 600; }
  .pb-txt span { font-size: 12px; color: var(--gm-slate); }
  .pb-txt em { font-style: normal; font-weight: 600; }

  /* ============ SELECTION / BATCH ============ */
  .tx-empty { padding: 22px 16px; text-align: center; font-size: 13px; color: var(--gm-slate); list-style: none; }
  .tx-row.selectable { cursor: pointer; }
  .tx-row.sel { background: var(--gm-mint-2); }
  .tx-check { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--gm-line); display: grid; place-items: center; flex: none; color: #fff; }
  .tx-check.on { background: var(--gm-green); border-color: var(--gm-green); }
  .list-toolbar { display: flex; align-items: center; justify-content: space-between; margin: 14px 2px 2px; }
  .list-toolbar .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 2px; }
  .seg-page.tri button { font-size: 12.5px; padding: 9px 4px; gap: 4px; }

  .batch-bar { position: absolute; left: 14px; right: 14px; bottom: 14px; z-index: 75; display: flex; align-items: center; gap: 10px; padding: 8px 8px 8px 12px; border-radius: 20px; background: var(--gm-ink); color: #fff; box-shadow: var(--gm-shadow-lg); animation: viewIn .25s ease; }
  .batch-bar > b { font-size: 13px; white-space: nowrap; }
  .bb-x { width: 32px; height: 32px; border-radius: 10px; border: 0; background: rgba(255,255,255,.14); color: #fff; display: grid; place-items: center; cursor: pointer; flex: none; }
  .bb-actions { display: flex; gap: 4px; margin-left: auto; }
  .bb-actions button { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: 0; color: #fff; font-family: var(--gm-ui); font-size: 9.5px; font-weight: 600; cursor: pointer; padding: 5px 7px; border-radius: 10px; }
  .bb-actions button:active { background: rgba(255,255,255,.14); }
  .bb-actions button.danger { color: #fca5a5; }

  /* ============ PROVISÕES LIST ============ */
  .prov-list { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .prov-row { background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 18px; overflow: hidden; box-shadow: var(--gm-shadow-sm); }
  .prov-row.late { border-color: var(--gm-coral); }
  .prov-row.sel { border-color: var(--gm-green); }
  .prov-main { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .prov-main .tx-meta b { display: flex; align-items: center; gap: 6px; }
  .prov-main em { font-style: normal; }
  .prov-actions { display: flex; gap: 8px; padding: 0 12px 12px; }
  .pa-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: 12px; border: 1.5px solid var(--gm-line); background: var(--gm-paper); color: var(--gm-ink); font-family: var(--gm-ui); font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .pa-btn.primary { background: var(--gm-grad); color: #fff; border: 0; box-shadow: 0 8px 16px -8px rgba(34,197,94,.7); }
  .empty-box { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 36px 16px; color: var(--gm-slate); text-align: center; }
  .empty-box p { margin: 0; font-size: 13.5px; }

  /* ============ EFETIVAR SHEET ============ */
  .efx-card { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 16px; background: var(--gm-cloud); margin-bottom: 6px; }
  .efx-card .tx-meta { flex: 1; min-width: 0; }
  .efx-card .tx-amt { font-size: 15px; font-weight: 700; }
  .efx-late { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; line-height: 1.45; color: var(--gm-coral); background: var(--gm-coral-bg); border-radius: 12px; padding: 10px 12px; margin: 4px 0 2px; }
  .efx-late svg { flex: none; margin-top: 1px; }
  .efx-total { display: flex; align-items: center; justify-content: space-between; padding: 14px 4px; margin-top: 4px; border-top: 1px solid var(--gm-line); }
  .efx-total span { font-size: 13.5px; color: var(--gm-slate); }
  .efx-total b { font-size: 22px; font-weight: 700; }

  /* Dark-theme tweaks for new components */
  .screen[data-theme="dark"] .repeat-row.on { background: rgba(34,197,94,.12); }
  .screen[data-theme="dark"] .rr-switch i { background: #cfe9d9; }
  .screen[data-theme="dark"] .month-nav button { background: rgba(255,255,255,.08); }
  .screen[data-theme="dark"] .tx-row.sel, .screen[data-theme="dark"] .prov-row.sel { background: rgba(34,197,94,.10); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/gm-data.jsx"></script>
<script type="text/babel" src="lib/gm-ui.jsx"></script>
<script type="text/babel" src="lib/gm-onboarding.jsx"></script>
<script type="text/babel" src="lib/gm-screens.jsx"></script>
<script type="text/babel" src="lib/gm-metas.jsx"></script>
<script type="text/babel" src="lib/gm-add.jsx"></script>
<script type="text/babel" src="lib/gm-provisions.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

function StatusBar({ dark }) {
  return (
    <div className={'statusbar' + (dark ? ' dark' : '')}>
      <span className="gm-num">9:41</span>
      <div className="sb-icons">
        <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="6.5" width="3" height="4.5" rx=".6" fill="currentColor"/><rect x="4.5" y="4.5" width="3" height="6.5" rx=".6" fill="currentColor"/><rect x="9" y="2.5" width="3" height="8.5" rx=".6" fill="currentColor"/><rect x="13.5" y="0" width="3" height="11" rx=".6" fill="currentColor"/></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.8c2.1 0 4 .8 5.4 2.2l1-1A9 9 0 0 0 8 1.3 9 9 0 0 0 1.6 4l1 1A7.6 7.6 0 0 1 8 2.8Z"/><path d="M8 6c1.1 0 2.1.4 2.9 1.2l1-1A6 6 0 0 0 8 4.4 6 6 0 0 0 4.1 6.2l1 1A4.2 4.2 0 0 1 8 6Z"/><circle cx="8" cy="9.4" r="1.4"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" strokeOpacity=".4" fill="none"/><rect x="2" y="2" width="16.5" height="8" rx="1.6" fill="currentColor"/><path d="M23 4v4c.7-.3 1.2-1 1.2-2S23.7 4.3 23 4Z" fill="currentColor" fillOpacity=".5"/></svg>
      </div>
    </div>
  );
}

const TABS = [
  { id: 'inicio',    label: 'Início',    icon: 'home' },
  { id: 'orcamento', label: 'Orçamento', icon: 'budget' },
  { id: 'cartoes',   label: 'Cartões',   icon: 'card' },
  { id: 'metas',     label: 'Metas',     icon: 'target' },
];

function GreenMindApp() {
  const params = new URLSearchParams(location.search);
  const embed = params.has('embed');
  React.useEffect(() => { if (embed) document.body.classList.add('embed'); }, [embed]);
  const [onboarded, setOnboarded] = useState(() => embed || localStorage.getItem('gm_onb') === '1');
  const [statusDark, setStatusDark] = useState(!onboarded);
  const [tab, setTab] = useState(() => params.get('screen') || localStorage.getItem('gm_tab') || 'inicio');
  const [sub, setSub] = useState(null);        // 'relatorios' | null
  const [addOpen, setAddOpen] = useState(false);
  const [hideBal, setHideBal] = useState(false);
  const [tx, setTx] = useState(SEED);
  const [cards, setCards] = useState(CARDS);
  const [cardTx, setCardTx] = useState(CARD_TX);
  const [ym, setYm] = useState('2026-06');
  const [efx, setEfx] = useState(null);        // tx being efetivada
  const [cardEdit, setCardEdit] = useState(null);
  const [picker, setPicker] = useState(null);  // { kind, type, ids, done }
  const [theme, setTheme] = useState(() => localStorage.getItem('gm_theme') || 'light');

  useEffect(() => { localStorage.setItem('gm_theme', theme); }, [theme]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  useEffect(() => { localStorage.setItem('gm_onb', onboarded ? '1' : '0'); }, [onboarded]);
  useEffect(() => { localStorage.setItem('gm_tab', tab); }, [tab]);

  const finishOnb = () => { setOnboarded(true); setStatusDark(false); };
  const goto = (where) => {
    if (where === 'relatorios') { setSub('relatorios'); return; }
    setSub(null); setTab(where);
    document.querySelector('.screen .scroll')?.scrollTo(0, 0);
  };
  const addTx = (t) => setTx(prev => Array.isArray(t) ? [...t, ...prev] : [t, ...prev]);
  const delTx = (id) => setTx(prev => prev.filter(t => t.id !== id));
  const navMonth = (d) => { setYm(m => addMonths(m, d)); document.querySelector('.screen .scroll')?.scrollTo(0, 0); };

  // Efetivar provisão: vira efetivado, na DATA em que foi pago, com juros/multa
  const confirmEfetivar = (id, { paidDate, juros }) => {
    setTx(prev => prev.map(t => t.id === id
      ? { ...t, status: 'efetivado', date: paidDate || t.date, juros: juros || 0, recur: undefined } : t));
    setEfx(null);
  };
  const batchEfetivar = (ids) => setTx(prev => prev.map(t =>
    ids.includes(t.id) ? { ...t, status: 'efetivado' } : t));
  // Adiar provisão não recebida/paga para o mês seguinte
  const deferTx = (id) => setTx(prev => prev.map(t =>
    t.id === id ? { ...t, date: sameDayIn(t.date, addMonths(ymOf(t.date), 1)) } : t));
  const batchDel = (ids) => setTx(prev => prev.filter(t => !ids.includes(t.id)));
  const batchDelCard = (ids) => setCardTx(prev => prev.filter(t => !ids.includes(t.id)));

  // Cadastro de cartão
  const openCardEdit = (card) => setCardEdit(card);
  const saveCard = (id, patch) => {
    if (id === 'new') {
      setCards(prev => [...prev, { ...patch, id: 'c' + Date.now(), brand: 'Mastercard', used: 0, grad: 'linear-gradient(135deg,#22C55E,#166534 90%)' }]);
    } else {
      setCards(prev => prev.map(c => c.id === id ? { ...c, ...patch } : c));
    }
    setCardEdit(null);
  };

  // Picker em lote (categoria / conta) — ids podem vir prefixados 'card:'
  const openPicker = (kind, type, ids, done) => setPicker({ kind, type, ids, done });
  const applyPicker = (patch) => {
    if (!picker) return;
    const cardIds = picker.ids.filter(i => i.startsWith('card:')).map(i => i.slice(5));
    const txIds = picker.ids.filter(i => !i.startsWith('card:'));
    if (cardIds.length) setCardTx(prev => prev.map(t => cardIds.includes(t.id) ? { ...t, ...patch } : t));
    if (txIds.length) setTx(prev => prev.map(t => txIds.includes(t.id) ? { ...t, ...patch } : t));
    picker.done && picker.done();
    setPicker(null);
  };

  const api = {
    delTx, openEfetivar: setEfx, deferTx, batchEfetivar, batchDel, batchDelCard,
    openCardEdit, openPicker,
  };

  let body;
  if (!onboarded) {
    body = <Onboarding onDone={finishOnb} setDark={setStatusDark} />;
  } else if (sub === 'relatorios') {
    body = <Relatorios tx={tx} onBack={() => setSub(null)} />;
  } else {
    const screen = {
      inicio: <Dashboard tx={tx} ym={ym} onNav={navMonth} onAdd={() => setAddOpen(true)} onGoto={goto} hideBal={hideBal} setHideBal={setHideBal} theme={theme} onToggleTheme={toggleTheme} />,
      orcamento: <Orcamento tx={tx} ym={ym} onNav={navMonth} onAdd={() => setAddOpen(true)} api={api} />,
      cartoes: <Cartoes cards={cards} cardTx={cardTx} api={api} />,
      metas: <Metas />,
    }[tab];
    body = <div className="view-anim" key={tab} style={{ height: '100%' }}>{screen}</div>;
  }

  const showChrome = onboarded && !sub;

  return (
    <div className="phone">
      <div className="island" />
      <div className="screen" data-theme={theme}>
        <StatusBar dark={statusDark} />
        {body}
        {showChrome && (
          <nav className="tabbar">
            {TABS.slice(0, 2).map(t => <TabBtn key={t.id} t={t} active={tab === t.id} onClick={() => goto(t.id)} />)}
            <button className="fab" onClick={() => setAddOpen(true)} aria-label="Novo lançamento"><Icon name="plus" size={26} stroke={2.6} /></button>
            {TABS.slice(2).map(t => <TabBtn key={t.id} t={t} active={tab === t.id} onClick={() => goto(t.id)} />)}
          </nav>
        )}
        <AddSheet open={addOpen} onClose={() => setAddOpen(false)} onSave={addTx} />
        <EfetivarSheet tx={efx} onClose={() => setEfx(null)} onConfirm={confirmEfetivar} />
        <CardEditSheet card={cardEdit} onClose={() => setCardEdit(null)} onSave={saveCard} />
        <PickerSheet kind={picker && picker.kind} type={picker && picker.type} onClose={() => setPicker(null)} onPick={applyPicker} />
      </div>
      <div className={'home-ind' + (statusDark ? ' light' : '')} />
    </div>
  );
}

function TabBtn({ t, active, onClick }) {
  return (
    <button className={'tab' + (active ? ' active' : '')} onClick={onClick}>
      <Icon name={t.icon} size={23} stroke={active ? 2.4 : 2} />
      <span>{t.label}</span>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GreenMindApp />);
</script>
</body>
</html>
