document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 #F1F5F9;  /* app background */\n  --gm-paper:    #FFFFFF;\n  --gm-line:     #E6EBE8;  /* hairline borders */\n  --gm-slate:    #64748B;  /* muted text */\n  --gm-slate-2:  #94A3B8;\n\n  /* Functional accents */\n  --gm-amber:    #F59E0B;  /* faturas / pending / attention */\n  --gm-amber-bg: #FEF3C7;\n  --gm-coral:    #EF4444;  /* despesas / negative */\n  --gm-coral-bg: #FEE2E2;\n  --gm-blue:     #3B82F6;  /* investimentos */\n  --gm-violet:   #8B5CF6;  /* empréstimos */\n\n  /* Brand gradient (from the logo mark) */\n  --gm-grad:     linear-gradient(140deg, #4ADE80 0%, #22C55E 42%, #166534 100%);\n  --gm-grad-dark:linear-gradient(160deg, #166534 0%, #0F2419 100%);\n\n  /* Type */\n  --gm-display: 'Poppins', system-ui, sans-serif;\n  --gm-ui:      'Poppins', system-ui, sans-serif;\n  --gm-num:     'Sora', 'Poppins', system-ui, sans-serif; /* tabular money figures */\n\n  /* Radii + shadow */\n  --gm-r-sm: 12px;\n  --gm-r:    18px;\n  --gm-r-lg: 26px;\n  --gm-r-xl: 34px;\n  --gm-shadow:    0 12px 32px -12px rgba(15,36,25,.22);\n  --gm-shadow-sm: 0 4px 14px -6px rgba(15,36,25,.18);\n  --gm-shadow-lg: 0 30px 70px -28px rgba(15,36,25,.40);\n}\n\n* { box-sizing: border-box; }\n\n.gm-num { font-family: var(--gm-num); font-variant-numeric: tabular-nums; letter-spacing: -.01em; }\n\n/* Typeset wordmark (legible alternative to the pale lockup PNG) */\n.gm-wordmark { font-family: var(--gm-display); font-weight: 700; letter-spacing: -.02em; line-height: 1; white-space: nowrap; }\n.gm-wordmark .g { color: var(--gm-green); margin-right: .22em; }\n.gm-wordmark .m { color: var(--gm-ink); }\n.gm-wordmark.on-dark .m { color: #fff; }\n.gm-wordmark.on-dark .g { color: var(--gm-lime); }\n<\u002Fstyle>\n<style>\n  html { scroll-behavior: smooth; }\n  body { margin: 0; font-family: var(--gm-ui); color: var(--gm-ink); background: var(--gm-paper); -webkit-font-smoothing: antialiased; overflow-x: hidden; transition: background .3s, color .3s; }\n\n  /* ===== DARK THEME ===== */\n  :root[data-theme=\"dark\"] {\n    --gm-cloud: #0C1511; --gm-paper: #101B15; --gm-line: rgba(255,255,255,.10);\n    --gm-ink: #E8F1EC; --gm-slate: #9DB1A6; --gm-slate-2: #6E847A;\n    --gm-mint: #182C20; --gm-mint-2: #10201A;\n  }\n  :root[data-theme=\"dark\"] nav { background: rgba(11,20,16,.82); }\n  :root[data-theme=\"dark\"] .pill { color: #86efac; }\n  :root[data-theme=\"dark\"] .feat:hover { box-shadow: 0 20px 50px -24px rgba(0,0,0,.7); }\n  .theme-toggle { width: 42px; height: 42px; border-radius: 13px; border: 1px solid var(--gm-line); background: transparent; color: var(--gm-ink); display: grid; place-items: center; cursor: pointer; transition: background .2s; flex: none; }\n  .theme-toggle:hover { background: var(--gm-cloud); }\n  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 32px; }\n  a { color: inherit; text-decoration: none; }\n  h1, h2, h3 { font-family: var(--gm-display); letter-spacing: -.025em; margin: 0; }\n  .num { font-family: var(--gm-num); font-variant-numeric: tabular-nums; }\n\n  /* NAV */\n  nav { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); background: rgba(255,255,255,.82); border-bottom: 1px solid var(--gm-line); }\n  .nav-in { display: flex; align-items: center; justify-content: space-between; height: 70px; }\n  .brand { display: flex; align-items: center; gap: 10px; }\n  .brand img { width: 38px; height: 38px; }\n  .brand .gm-wordmark { font-size: 22px; }\n  .nav-links { display: flex; align-items: center; gap: 30px; font-size: 14.5px; font-weight: 500; color: var(--gm-slate); }\n  .nav-links a:hover { color: var(--gm-ink); }\n  .nav-cta { display: flex; align-items: center; gap: 14px; }\n  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--gm-ui); font-weight: 600; font-size: 15px; border-radius: 14px; padding: 12px 22px; cursor: pointer; border: 0; transition: transform .15s, box-shadow .2s, background .2s; }\n  .btn-primary { background: var(--gm-grad); color: #fff; box-shadow: 0 1  border-radius: 7px; background: rgba(255,255,255,.12); overflow: hidden; }\n  .ad-bar span { display: block; height: 100%; border-radius: 7px; }\n\n  /* dream / steps */\n  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; counter-reset: s; }\n  .step { position: relative; padding-top: 18px; }\n  .step .n { font-family: var(--gm-num); font-size: 15px; font-weight: 700; color: var(--gm-green); width: 38px; height: 38px; border-radius: 12px; background: var(--gm-mint); display: grid; place-items: center; margin-bottom: 16px; }\n  .step h3 { font-size: 20px; margin-bottom: 8px; }\n  .step p { color: var(--gm-slate); font-size: 15px; line-height: 1.5; margin: 0; }\n\n  /* PRICING */\n  .price-toggle { display: inline-flex; align-items: center; gap: 4px; background: var(--gm-cloud); border: 1px solid var(--gm-line); border-radius: 999px; padding: 5px; margin: 22px auto 0; }\n  .price-toggle button { border: 0; background: none; font-family: var(--gm-ui); font-weight: 600; font-size: 14.5px; color: var(--gm-slate); padding: 9px 20px; border-radius: 999px; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 8px; }\n  .price-toggle button.on { background: var(--gm-paper); color: var(--gm-ink); box-shadow: var(--gm-shadow-sm); }\n  .price-toggle .save { font-size: 11px; font-weight: 700; color: var(--gm-green-600); background: var(--gm-mint); padding: 2px 7px; border-radius: 7px; }\n\n  .plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; align-items: stretch; margin-top: 46px; }\n  .plan { position: relative; background: var(--gm-paper); border: 1px solid var(--gm-line); border-radius: 26px; padding: 32px 28px; display: flex; flex-direction: column; transition: transform .2s, box-shadow .2s; }\n  .plan:hover { transform: translateY(-4px); box-shadow: var(--gm-shadow); }\n  .plan.feature { border: 0; background: var(--gm-grad-dark); color: #fff; box-shadow: var(--gm-shadow-lg); }\n  .plan-badge { position: absolute; top: -13px; left: 50%; transform: translateX(-50%); background: var(--gm-grad); color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; box-shadow: 0 8px 18px -8px rgba(34,197,94,.8); white-space: nowrap; }\n  .plan-name { font-family: var(--gm-display); font-size: 19px; font-weight: 600; }\n  .plan-desc { font-size: 13.5px; color: var(--gm-slate); margin: 6px 0 20px; min-height: 38px; line-height: 1.4; }\n  .plan.feature .plan-desc { color: rgba(255,255,255,.75); }\n  .plan-price { display: flex; align-items: baseline; gap: 4px; }\n  .plan-price .cur { font-family: var(--gm-num); font-size: 18px; font-weight: 600; color: var(--gm-slate); }\n  .plan.feature .plan-price .cur { color: rgba(255,255,255,.7); }\n  .plan-price .val { font-family: var(--gm-num); font-size: 46px; font-weight: 700; letter-spacing: -.02em; line-height: 1; }\n  .plan-price .per { font-size: 14px; color: var(--gm-slate); align-self: flex-end; margin-bottom: 8px; }\n  .plan.feature .plan-price .per { color: rgba(255,255,255,.7); }\n  .plan-billed { font-size: 12.5px; color: var(--gm-green-600); font-weight: 600; margin: 8px 0 0; min-height: 18px; }\n  .plan.feature .plan-billed { color: var(--gm-lime); }\n  .plan-feats { list-style: none; margin: 22px 0 26px; padding: 18px 0 0; border-top: 1px solid var(--gm-line); display: flex; flex-direction: column; gap: 12px; flex: 1; }\n  .plan.feature .plan-feats { border-top-color: rgba(255,255,255,.14); }\n  .plan-feats li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; line-height: 1.4; }\n  .plan-feats li.lead { font-weight: 600; }\n  .plan-feats svg { flex: none; margin-top: 2px; color: var(--gm-green-600); }\n  .plan.feature .plan-feats svg { color: var(--gm-lime); }\n  .plan .btn { width: 100%; justify-content: center; }\n  .plan.feature .btn-primary { background: #fff; color: var(--gm-forest); box-shadow: 0 12px 26px -12px
