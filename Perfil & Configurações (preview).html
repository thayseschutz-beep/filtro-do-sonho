<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GreenMind — Perfil & Configurações</title>
<link rel="stylesheet" href="assets/brand.css"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',system-ui,sans-serif;transition:background .25s}
  .num{font-family:'Sora',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit}
  input,select{font-family:inherit}
  .topbtn{position:fixed;top:14px;right:14px;z-index:50;padding:9px 15px;border-radius:11px;border:1px solid #94a3b8;background:#fff;color:#0f172a;cursor:pointer;font-weight:600;font-size:13px}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(120,140,130,.4);border-radius:5px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
const {useState} = React;

/* ===== paleta (mesma do app) ===== */
const LIGHT = { bg:"#F1F5F9",surface:"#FFFFFF",surfaceAlt:"#F8FAFC",border:"#E2E8F0",borderStrong:"#CBD5E1",text:"#0F172A",textSub:"#64748B",textMuted:"#94A3B8",green:"#16A34A",greenLight:"#DCFCE7",red:"#DC2626",redLight:"#FEE2E2",blue:"#0284C7",blueLight:"#E0F2FE",amber:"#D97706",amberLight:"#FEF3C7",forest:"#166534" };
const DARK = { bg:"#0A1310",surface:"#101B15",surfaceAlt:"#16241D",border:"rgba(255,255,255,0.10)",borderStrong:"rgba(255,255,255,0.20)",text:"#E8F1EC",textSub:"#9DB1A6",textMuted:"#6E847A",green:"#34D399",greenLight:"rgba(52,211,153,0.16)",red:"#F87171",redLight:"rgba(248,113,113,0.16)",blue:"#38BDF8",blueLight:"rgba(56,189,248,0.16)",amber:"#FBBF24",amberLight:"rgba(251,191,36,0.16)",forest:"#22C55E" };

const ICON = {
  perfil:"M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0ZM4 21a8 8 0 0 1 16 0",
  casal:"M9 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM21 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM2 20a4 4 0 0 1 8 0M14 20a4 4 0 0 1 8 0",
  prefs:"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H7a1.6 1.6 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z",
  regra:"M3 3v18h18M7 14l4-4 3 3 5-6",
  notif:"M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0",
  seg:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z",
  plano:"M3 6h18M3 6v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6M3 6l2-3h14l2 3M9 11h6",
  dados:"M21 5c0 1.66-4 3-9 3S3 6.66 3 5s4-3 9-3 9 1.34 9 3ZM3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5M3 12c0 1.66 4 3 9 3s9-1.34 9-3",
};
function I({d,s=18,sw=2}){return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;}

const SECTIONS = [
  {k:"perfil",label:"Perfil",ic:"perfil"},
  {k:"casal",label:"Conta conjunta",ic:"casal",badge:"Casal"},
  {k:"prefs",label:"Preferências",ic:"prefs"},
  {k:"regra",label:"Regra 50/30/20",ic:"regra"},
  {k:"notif",label:"Notificações",ic:"notif"},
  {k:"seg",label:"Segurança",ic:"seg"},
  {k:"plano",label:"Plano & assinatura",ic:"plano"},
  {k:"dados",label:"Dados & privacidade",ic:"dados"},
];

/* ===== controles reutilizáveis ===== */
function Toggle({on,onClick,T}){
  return <button onClick={onClick} style={{width:"44px",height:"26px",borderRadius:"999px",border:"none",cursor:"pointer",padding:"3px",background:on?T.green:T.borderStrong,transition:".2s",flexShrink:0,position:"relative"}}>
    <span style={{display:"block",width:"20px",height:"20px",borderRadius:"50%",background:"#fff",transform:on?"translateX(18px)":"translateX(0)",transition:".2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
  </button>;
}
function Field({label,children,T,hint}){
  return <div style={{marginBottom:"16px"}}>
    <label style={{display:"block",fontSize:"12.5px",fontWeight:600,color:T.textSub,marginBottom:"6px"}}>{label}</label>
    {children}
    {hint&&<p style={{fontSize:"11.5px",color:T.textMuted,margin:"5px 0 0"}}>{hint}</p>}
  </div>;
}
function Row({label,desc,right,T}){
  return <div style={{display:"flex",alignItems:"center",gap:"14px",padding:"13px 0",borderBottom:`1px solid ${T.border}`}}>
    <div style={{flex:1}}>
      <p style={{fontSize:"14px",fontWeight:500,color:T.text,margin:0}}>{label}</p>
      {desc&&<p style={{fontSize:"12.5px",color:T.textSub,margin:"2px 0 0",lineHeight:1.4}}>{desc}</p>}
    </div>
    {right}
  </div>;
}
const inp = (T)=>({width:"100%",background:T.surfaceAlt,border:`1.5px solid ${T.borderStrong}`,borderRadius:"10px",padding:"11px 13px",color:T.text,fontSize:"14px",outline:"none"});
const btnGreen = (T)=>({padding:"11px 20px",borderRadius:"11px",border:"none",cursor:"pointer",background:"linear-gradient(140deg,#22C55E,#166534)",color:"#fff",fontWeight:600,fontSize:"14px",boxShadow:"0 8px 18px -8px rgba(34,197,94,.7)"});
const btnGhost = (T)=>({padding:"10px 18px",borderRadius:"11px",border:`1.5px solid ${T.borderStrong}`,cursor:"pointer",background:"transparent",color:T.text,fontWeight:600,fontSize:"13px"});

/* avatar */
function Avatar({name,color,size=44,you}){
  const initials=name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
  return <div style={{width:size,height:size,borderRadius:"50%",background:color,color:"#fff",display:"grid",placeItems:"center",fontWeight:700,fontSize:size*0.36+"px",flexShrink:0,boxShadow:"0 2px 8px rgba(0,0,0,.18)",fontFamily:"Poppins"}}>{initials}</div>;
}

/* ===== seções ===== */
function SecPerfil({T}){
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:"16px",marginBottom:"22px"}}>
      <div style={{position:"relative"}}>
        <Avatar name="Thayse" color="#166534" size={72}/>
        <button style={{position:"absolute",bottom:-2,right:-2,width:"26px",height:"26px",borderRadius:"50%",border:`2px solid ${T.surface}`,background:T.green,color:"#fff",cursor:"pointer",display:"grid",placeItems:"center"}}><I d="M12 5v14M5 12h14" s={13}/></button>
      </div>
      <div>
        <p style={{fontSize:"18px",fontWeight:700,color:T.text,margin:0}}>Thayse</p>
        <p style={{fontSize:"13px",color:T.textSub,margin:"3px 0 0"}}>thayse@email.com · Plano Pro</p>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
      <Field label="Nome" T={T}><input style={inp(T)} defaultValue="Thayse"/></Field>
      <Field label="Telefone" T={T}><input style={inp(T)} defaultValue="(11) 99999-0000"/></Field>
    </div>
    <Field label="E-mail" T={T} hint="Usado para login e para receber convites."><input style={inp(T)} defaultValue="thayse@email.com"/></Field>
    <div style={{height:"1px",background:T.border,margin:"8px 0 18px"}}/>
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"0 0 12px"}}>Alterar senha</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
      <Field label="Senha atual" T={T}><input type="password" style={inp(T)} defaultValue="••••••••"/></Field>
      <Field label="Nova senha" T={T}><input type="password" style={inp(T)} placeholder="Mínimo 8 caracteres"/></Field>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:"10px",marginTop:"8px"}}>
      <button style={btnGhost(T)}>Cancelar</button>
      <button style={btnGreen(T)}>Salvar alterações</button>
    </div>
  </div>;
}

function SecCasal({T}){
  const [shareToggles,setShareToggles]=useState({lanc:true,cartoes:true,metas:true,mei:false});
  const [perms,setPerms]=useState({lucas:"editar"}); // editar | ver | admin
  const PERM = {
    admin:{label:"Administrador",desc:"Acesso total: lança, edita, exclui, convida e gerencia o plano",c:T.green,bg:T.greenLight},
    editar:{label:"Pode editar",desc:"Lança, edita e exclui — mas não gerencia membros nem o plano",c:T.blue,bg:T.blueLight},
    ver:{label:"Somente ver",desc:"Visualiza tudo, mas não pode lançar nem alterar nada",c:T.amber,bg:T.amberLight},
  };
  return <div>
    {/* status tempo real */}
    <div style={{background:"linear-gradient(160deg,#166534,#0F2419)",borderRadius:"18px",padding:"20px",color:"#fff",marginBottom:"18px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,opacity:.5,background:"radial-gradient(130px 130px at 90% -10%, rgba(74,222,128,.5), transparent 70%)"}}/>
      <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
        <div>
          <p style={{fontSize:"15px",fontWeight:700,margin:0}}>Conta da família</p>
          <p style={{fontSize:"12.5px",color:"rgba(255,255,255,.7)",margin:"3px 0 0"}}>2 pessoas · sincronizadas</p>
        </div>
        <span style={{display:"inline-flex",alignItems:"center",gap:"7px",background:"rgba(74,222,128,.22)",color:"#bbf7d0",fontSize:"11.5px",fontWeight:600,padding:"6px 12px",borderRadius:"999px"}}>
          <span style={{width:"7px",height:"7px",borderRadius:"50%",background:"#4ADE80",boxShadow:"0 0 0 3px rgba(74,222,128,.3)"}}/>Tempo real
        </span>
      </div>
      <div style={{position:"relative",display:"flex",alignItems:"center",gap:"-10px"}}>
        <Avatar name="Thayse" color="#22C55E" size={46}/>
        <div style={{marginLeft:"-12px"}}><Avatar name="Lucas Silva" color="#0EA5E9" size={46}/></div>
        <p style={{marginLeft:"14px",fontSize:"12.5px",color:"rgba(255,255,255,.85)"}}>Última atualização agora há pouco</p>
      </div>
    </div>

    {/* membros + permissões */}
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"0 0 8px"}}>Membros & permissões</p>
    {/* você (admin, fixo) */}
    <div style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:"12px",marginBottom:"8px"}}>
      <Avatar name="Thayse" color="#166534" size={40}/>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:"14px",fontWeight:600,color:T.text,margin:0}}>Thayse <span style={{fontSize:"11px",color:T.green,fontWeight:600}}>· você</span></p>
        <p style={{fontSize:"12px",color:T.textSub,margin:"2px 0 0"}}>thayse@email.com</p>
      </div>
      <span style={{fontSize:"11.5px",fontWeight:600,color:T.green,background:T.greenLight,border:`1px solid ${T.green}40`,padding:"5px 10px",borderRadius:"8px",flexShrink:0}}>Administrador</span>
    </div>
    {/* lucas (permissão editável) */}
    <div style={{padding:"12px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:"12px",marginBottom:"8px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <Avatar name="Lucas Silva" color="#0EA5E9" size={40}/>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:"14px",fontWeight:600,color:T.text,margin:0}}>Lucas Silva</p>
          <p style={{fontSize:"12px",color:T.textSub,margin:"2px 0 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>lucas@email.com</p>
        </div>
      </div>
      {/* segmented permissão */}
      <div style={{display:"flex",gap:"5px",marginTop:"12px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:"11px",padding:"4px"}}>
        {["admin","editar","ver"].map(p=>{const on=perms.lucas===p;const P=PERM[p];return (
          <button key={p} onClick={()=>setPerms(s=>({...s,lucas:p}))} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"7px",border:"none",cursor:"pointer",fontSize:"12.5px",fontWeight:600,padding:"9px 8px",borderRadius:"8px",background:on?P.bg:"transparent",color:on?P.c:T.textSub,transition:".15s"}}>
            <span style={{width:"7px",height:"7px",borderRadius:"50%",background:on?P.c:T.borderStrong}}/>{P.label}
          </button>
        );})}
      </div>
      <p style={{fontSize:"12px",color:T.textSub,margin:"10px 2px 0",lineHeight:1.45}}>{PERM[perms.lucas].desc}</p>
      {perms.lucas==="ver"&&<p style={{fontSize:"11.5px",color:T.amber,margin:"6px 2px 0",fontWeight:500}}>👀 O Lucas verá tudo em tempo real, mas os botões de lançar e editar ficam ocultos pra ele.</p>}
    </div>

    {/* convite */}
    <div style={{border:`1.5px dashed ${T.borderStrong}`,borderRadius:"12px",padding:"16px",marginTop:"6px"}}>
      <p style={{fontSize:"13.5px",fontWeight:600,color:T.text,margin:"0 0 4px"}}>Convidar alguém</p>
      <p style={{fontSize:"12.5px",color:T.textSub,margin:"0 0 12px",lineHeight:1.45}}>A pessoa recebe um e-mail para baixar o app. Você define a permissão dela ao convidar.</p>
      <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
        <input style={{...inp(T),flex:1}} placeholder="email@exemplo.com"/>
        <select style={{...inp(T),width:"auto"}} defaultValue="editar"><option value="admin">Administrador</option><option value="editar">Pode editar</option><option value="ver">Somente ver</option></select>
      </div>
      <button style={{...btnGreen(T),width:"100%"}}>Enviar convite</button>
    </div>

    {/* o que compartilhar */}
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"20px 0 4px"}}>O que vocês compartilham</p>
    <Row T={T} label="Lançamentos & saldo" desc="Receitas, despesas e o saldo do mês" right={<Toggle T={T} on={shareToggles.lanc} onClick={()=>setShareToggles(s=>({...s,lanc:!s.lanc}))}/>}/>
    <Row T={T} label="Cartões & faturas" desc="Limites, faturas e parcelas" right={<Toggle T={T} on={shareToggles.cartoes} onClick={()=>setShareToggles(s=>({...s,cartoes:!s.cartoes}))}/>}/>
    <Row T={T} label="Metas" desc="Objetivos e progresso" right={<Toggle T={T} on={shareToggles.metas} onClick={()=>setShareToggles(s=>({...s,metas:!s.metas}))}/>}/>
    <Row T={T} label="MEI de cada um" desc="Mantenha o MEI individual privado se preferir" right={<Toggle T={T} on={shareToggles.mei} onClick={()=>setShareToggles(s=>({...s,mei:!s.mei}))}/>}/>
  </div>;
}

function SecPrefs({T,dark,setDark}){
  const [moeda,setMoeda]=useState("BRL");
  const [fech,setFech]=useState("1");
  return <div>
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"0 0 4px"}}>Aparência</p>
    <Row T={T} label="Tema" desc="Claro, escuro ou conforme o aparelho" right={
      <div style={{display:"flex",gap:"4px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:"10px",padding:"3px"}}>
        {[["light","Claro"],["dark","Escuro"],["sys","Auto"]].map(([k,l])=>(
          <button key={k} onClick={()=>{if(k!=="sys")setDark(k==="dark");}} style={{border:"none",cursor:"pointer",fontSize:"12.5px",fontWeight:600,padding:"7px 12px",borderRadius:"8px",background:(k==="dark"&&dark)||(k==="light"&&!dark)?T.surface:"transparent",color:(k==="dark"&&dark)||(k==="light"&&!dark)?T.text:T.textSub,boxShadow:(k==="dark"&&dark)||(k==="light"&&!dark)?"0 1px 3px rgba(0,0,0,.15)":"none"}}>{l}</button>
        ))}
      </div>
    }/>
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"22px 0 4px"}}>Regional</p>
    <Row T={T} label="Moeda" right={<select value={moeda} onChange={e=>setMoeda(e.target.value)} style={{...inp(T),width:"auto"}}><option value="BRL">Real (R$)</option><option value="USD">Dólar (US$)</option><option value="EUR">Euro (€)</option></select>}/>
    <Row T={T} label="Dia de fechamento do mês" desc="Quando seu mês financeiro vira (ex.: dia do salário)" right={<select value={fech} onChange={e=>setFech(e.target.value)} style={{...inp(T),width:"auto"}}>{[1,5,10,15,20,25].map(d=><option key={d} value={d}>Dia {d}</option>)}</select>}/>
    <Row T={T} label="Começo da semana" right={<select style={{...inp(T),width:"auto"}}><option>Domingo</option><option>Segunda</option></select>}/>
  </div>;
}

function SecRegra({T}){
  const [v,setV]=useState({ess:50,pes:30,inv:20});
  const set=(k,val)=>{const nv={...v,[k]:val};setV(nv);};
  const total=v.ess+v.pes+v.inv;
  const bars=[["ess","Essencial","#38BDF8","Moradia, contas, mercado"],["pes","Pessoal","#FBBF24","Lazer, roupas, hobbies"],["inv","Investir & metas","#22C55E","Poupança, reserva, sonhos"]];
  return <div>
    <p style={{fontSize:"13.5px",color:T.textSub,margin:"0 0 18px",lineHeight:1.5}}>O padrão é <b style={{color:T.text}}>50/30/20</b>, mas você pode ajustar para o que faz sentido pra vocês (ex.: 60/20/20).</p>
    {bars.map(([k,l,c,d])=>(
      <div key={k} style={{marginBottom:"18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <span style={{display:"flex",alignItems:"center",gap:"9px",fontSize:"14px",fontWeight:500,color:T.text}}><span style={{width:"11px",height:"11px",borderRadius:"3px",background:c}}/>{l} <span style={{fontSize:"12px",color:T.textMuted,fontWeight:400}}>· {d}</span></span>
          <span className="num" style={{fontSize:"15px",fontWeight:700,color:T.text}}>{v[k]}%</span>
        </div>
        <input type="range" min="0" max="100" value={v[k]} onChange={e=>set(k,+e.target.value)} style={{width:"100%",accentColor:c}}/>
      </div>
    ))}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:"11px",background:total===100?T.greenLight:T.redLight,border:`1px solid ${total===100?T.green+"40":T.red+"40"}`,marginTop:"4px"}}>
      <span style={{fontSize:"13px",fontWeight:600,color:total===100?T.green:T.red}}>{total===100?"✓ Soma 100% — perfeito":`Soma ${total}% — ajuste para 100%`}</span>
      <button onClick={()=>setV({ess:50,pes:30,inv:20})} style={{...btnGhost(T),padding:"6px 12px",fontSize:"12px"}}>Restaurar padrão</button>
    </div>
  </div>;
}

function SecNotif({T}){
  const [n,setN]=useState({fatura:true,lancar:true,meta:true,resumo:true,mei:true,casal:true});
  const items=[
    ["fatura","Vencimento de faturas","Avisa 3 dias antes de cada fatura"],
    ["lancar","Lembrete de lançar","Toda noite, se você não registrou nada"],
    ["meta","Meta atingida","Quando você bate um objetivo 🎉"],
    ["resumo","Resumo mensal","No 1º dia do mês, um balanço do mês anterior"],
    ["mei","Alerta de limite MEI","Quando a projeção passar de 80% do limite"],
    ["casal","Atividade do casal","Quando o Lucas adiciona ou edita algo"],
  ];
  return <div>
    {items.map(([k,l,d])=>(
      <Row key={k} T={T} label={l} desc={d} right={<Toggle T={T} on={n[k]} onClick={()=>setN(s=>({...s,[k]:!s[k]}))}/>}/>
    ))}
  </div>;
}

function SecSeg({T}){
  const [bio,setBio]=useState(true),[twofa,setTwofa]=useState(false);
  return <div>
    <Row T={T} label="Desbloqueio por biometria" desc="Use Face ID / digital ao abrir o app" right={<Toggle T={T} on={bio} onClick={()=>setBio(!bio)}/>}/>
    <Row T={T} label="PIN de 4 dígitos" desc="Alternativa à biometria" right={<button style={btnGhost(T)}>Configurar</button>}/>
    <Row T={T} label="Verificação em duas etapas" desc="Código extra por e-mail ao entrar em um aparelho novo" right={<Toggle T={T} on={twofa} onClick={()=>setTwofa(!twofa)}/>}/>
    <p style={{fontSize:"13px",fontWeight:700,color:T.text,margin:"20px 0 8px"}}>Sessões ativas</p>
    {[["iPhone 15 · Thayse","São Paulo · agora",true],["Chrome · Windows","São Paulo · há 2 dias",false]].map(([d,s,cur])=>(
      <div key={d} style={{display:"flex",alignItems:"center",gap:"12px",padding:"11px 0",borderBottom:`1px solid ${T.border}`}}>
        <span style={{color:T.textSub}}><I d="M5 3h14a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1ZM12 18h.01"/></span>
        <div style={{flex:1}}><p style={{fontSize:"13.5px",fontWeight:500,color:T.text,margin:0}}>{d}</p><p style={{fontSize:"12px",color:T.textSub,margin:"2px 0 0"}}>{s}</p></div>
        {cur?<span style={{fontSize:"11.5px",color:T.green,fontWeight:600}}>Atual</span>:<button style={{background:"none",border:"none",color:T.red,fontSize:"12.5px",fontWeight:600,cursor:"pointer"}}>Encerrar</button>}
      </div>
    ))}
  </div>;
}

function SecPlano({T}){
  return <div>
    <div style={{background:"linear-gradient(140deg,#4ADE80,#22C55E 42%,#166534)",borderRadius:"18px",padding:"22px",color:"#fff",marginBottom:"18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><p style={{fontSize:"12px",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",opacity:.85,margin:0}}>Plano atual</p><p style={{fontSize:"26px",fontWeight:700,margin:"4px 0 0"}}>Família</p></div>
        <span style={{background:"rgba(255,255,255,.2)",padding:"6px 12px",borderRadius:"999px",fontSize:"12px",fontWeight:600}}>Ativo</span>
      </div>
      <p style={{fontSize:"13px",opacity:.9,margin:"10px 0 0"}}>R$ 69/mês · renova em 12 jul 2026 · 2 MEIs incluídos</p>
    </div>
    <Row T={T} label="Forma de pagamento" desc="Mastercard •••• 4821" right={<button style={btnGhost(T)}>Alterar</button>}/>
    <Row T={T} label="Histórico de faturas" desc="Baixe seus recibos" right={<button style={btnGhost(T)}>Ver</button>}/>
    <Row T={T} label="Trocar de plano" desc="Essencial · Pro · Família" right={<button style={btnGhost(T)}>Comparar</button>}/>
    <button style={{background:"none",border:"none",color:T.red,fontSize:"13px",fontWeight:600,cursor:"pointer",marginTop:"14px",padding:0}}>Cancelar assinatura</button>
  </div>;
}

function SecDados({T}){
  return <div>
    <Row T={T} label="Backup automático" desc="Seus dados ficam salvos na nuvem com segurança" right={<Toggle T={T} on={true} onClick={()=>{}}/>}/>
    <Row T={T} label="Exportar meus dados" desc="Baixe tudo em JSON ou Excel (LGPD)" right={<button style={btnGhost(T)}>Exportar</button>}/>
    <Row T={T} label="Importar de planilha" desc="Google Sheets, Excel ou outro app" right={<button style={btnGhost(T)}>Importar</button>}/>
    <div style={{background:T.redLight,border:`1px solid ${T.red}30`,borderRadius:"12px",padding:"16px",marginTop:"18px"}}>
      <p style={{fontSize:"13.5px",fontWeight:700,color:T.red,margin:"0 0 4px"}}>Zona de perigo</p>
      <p style={{fontSize:"12.5px",color:T.textSub,margin:"0 0 12px",lineHeight:1.45}}>Excluir a conta apaga seus dados permanentemente. Se você estiver numa conta de casal, o Lucas mantém os dados dele.</p>
      <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
        <button style={{padding:"9px 16px",borderRadius:"10px",border:`1.5px solid ${T.red}`,background:"transparent",color:T.red,fontWeight:600,fontSize:"13px",cursor:"pointer"}}>Sair da conta conjunta</button>
        <button style={{padding:"9px 16px",borderRadius:"10px",border:"none",background:T.red,color:"#fff",fontWeight:600,fontSize:"13px",cursor:"pointer"}}>Excluir minha conta</button>
      </div>
    </div>
  </div>;
}

function Modal({dark,setDark}){
  const T = dark?DARK:LIGHT;
  const [sec,setSec]=useState("casal");
  const Body={perfil:SecPerfil,casal:SecCasal,prefs:SecPrefs,regra:SecRegra,notif:SecNotif,seg:SecSeg,plano:SecPlano,dados:SecDados}[sec];
  const cur=SECTIONS.find(s=>s.k===sec);
  return (
    <div style={{position:"fixed",inset:0,zIndex:40,background:"rgba(0,0,0,.5)",backdropFilter:"blur(5px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <div style={{background:T.surface,borderRadius:"22px",width:"860px",maxWidth:"96vw",height:"640px",maxHeight:"92vh",display:"flex",overflow:"hidden",boxShadow:"0 40px 90px -30px rgba(0,0,0,.6)",border:`1px solid ${T.border}`}}>
        {/* rail */}
        <div style={{width:"248px",flexShrink:0,background:T.surfaceAlt,borderRight:`1px solid ${T.border}`,padding:"22px 14px",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"0 8px 18px"}}>
            <img src="assets/logo-mark.png" alt="" style={{width:"30px",height:"30px",objectFit:"contain"}}/>
            <span style={{fontWeight:700,fontSize:"15px",color:T.text}}><span style={{color:T.forest}}>Green</span>Mind</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:"2px",flex:1,overflowY:"auto"}}>
            {SECTIONS.map(s=>{const on=sec===s.k;return (
              <button key={s.k} onClick={()=>setSec(s.k)} style={{display:"flex",alignItems:"center",gap:"11px",padding:"10px 12px",borderRadius:"10px",border:"none",cursor:"pointer",textAlign:"left",background:on?(dark?"rgba(52,211,153,.16)":"#fff"):"transparent",color:on?(dark?T.forest:T.forest):T.textSub,fontWeight:on?600:500,fontSize:"13.5px",boxShadow:on&&!dark?"0 1px 3px rgba(0,0,0,.08)":"none"}}>
                <span style={{color:on?T.forest:T.textMuted,display:"grid",placeItems:"center"}}><I d={ICON[s.ic]} s={17}/></span>
                <span style={{flex:1}}>{s.label}</span>
                {s.badge&&<span style={{fontSize:"10px",fontWeight:700,color:T.forest,background:dark?"rgba(52,211,153,.16)":"#DCFCE7",padding:"2px 7px",borderRadius:"6px"}}>{s.badge}</span>}
              </button>
            );})}
          </div>
          <button style={{display:"flex",alignItems:"center",gap:"11px",padding:"11px 12px",borderRadius:"10px",border:"none",cursor:"pointer",background:"transparent",color:T.red,fontWeight:600,fontSize:"13.5px",marginTop:"8px"}}>
            <I d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" s={17}/>Sair
          </button>
        </div>
        {/* content */}
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 26px",borderBottom:`1px solid ${T.border}`}}>
            <div>
              <h2 style={{fontSize:"19px",fontWeight:700,color:T.text,margin:0}}>{cur.label}</h2>
              <p style={{fontSize:"12.5px",color:T.textSub,margin:"2px 0 0"}}>{ {perfil:"Seus dados pessoais e acesso",casal:"Compartilhe tudo com quem você ama",prefs:"Deixe o app do seu jeito",regra:"Personalize seu orçamento",notif:"Escolha o que quer receber",seg:"Proteja sua conta",plano:"Gerencie sua assinatura",dados:"Controle total dos seus dados"}[sec] }</p>
            </div>
            <button style={{width:"36px",height:"36px",borderRadius:"10px",border:`1px solid ${T.border}`,background:T.surface,color:T.textSub,cursor:"pointer",display:"grid",placeItems:"center",flexShrink:0}}><I d="M18 6 6 18M6 6l12 12"/></button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"24px 26px"}}>
            <Body T={T} dark={dark} setDark={setDark}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [dark,setDark]=useState(false);
  React.useEffect(()=>{document.body.style.background=dark?"#0A1310":"#E9EEF2";},[dark]);
  return <div>
    <button className="topbtn" onClick={()=>setDark(d=>!d)} style={{background:dark?"#101B15":"#fff",color:dark?"#fff":"#0f172a",borderColor:dark?"#2a3a32":"#94a3b8"}}>Tema: {dark?"Escuro":"Claro"}</button>
    <Modal dark={dark} setDark={setDark}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
